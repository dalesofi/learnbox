  <rect x="410" y="230" width="76" height="96" rx="8" fill="#fff" stroke="#c7d2fe" stroke-width="1.5" filter="url(#s)"/>
  <path d="M430 268 L466 268" stroke="#818cf8" stroke-width="3" stroke-linecap="round"/>
  <path d="M430 284 L458 284" stroke="#e2e8f0" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M430 298 L452 298" stroke="#e2e8f0" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Stickers -->
