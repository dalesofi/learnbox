  <text x="224" y="312" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="600" fill="#64748b">Aa</text>
  <rect x="290" y="210" width="100" height="72" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5" filter="url(#s)"/>
